<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home - Demonstration Apps</title>
  <style>
    /* Basic styling for layout */
    body {
      display: flex;
      flex-direction: column; /* Make the body a flex container with a vertical layout */
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;
    }

    /* Container for sidebar and content */
    .container {
      display: flex;
      flex-grow: 1;
    }

    /* Sidebar styling */
    #sidebar {
      width: 250px;
      background-color: #f4f4f4;
      padding: 20px;
      border-right: 1px solid #ddd;
      overflow-y: auto;
      transition: transform 0.3s ease;
    }

    #sidebar.hidden {
      transform: translateX(-100%);
    }

    #sidebar ul {
      list-style-type: none;
      padding: 0;
    }

    #sidebar ul li {
      margin-bottom: 10px;
    }

    #sidebar ul li a {
      text-decoration: none;
      color: #333;
    }

    /* Main content area styling */
    #main-content {
      flex-grow: 1;
      padding: 20px;
      overflow: hidden;
      position: relative;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Button to toggle sidebar */
    #toggle-sidebar {
      position: absolute;
      top: 10px;
      left: 10px;
      background-color: #333;
      color: #fff;
      border: none;
      padding: 5px 10px;
      cursor: pointer;
    }

  /* Styling for the sidebar links */
  #demo-list li {
    padding: 8px;
    margin-bottom: 5px;
    cursor: pointer;
    transition: background-color 0.3s ease;
  }

  /* Hover effect for list items */
  #demo-list li:hover {
    background-color: #e0e0e0; /* Light gray background on hover */
  }

  /* Active demo list item */
  #demo-list li.active {
    background-color: #d0d0d0; /* Slightly darker gray background for active item */
    font-weight: bold; /* Optional: Make active item text bold */
  }

  #demo-list a {
    text-decoration: none;
    color: inherit; /* Inherit color from the list item */
  }
  </style>
</head>
<body>
  <!-- Include external JavaScript file -->
  <script src="scripts.js"></script>
</body>
</html>
